events {}

http {
  # HTTP: serve ACME challenge, redirect everything else to HTTPS
  server {
    listen 80;
    server_name mysuperapp.win www.mysuperapp.win;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS
  server {
    listen 443 ssl;
    server_name mysuperapp.win www.mysuperapp.win;

    ssl_certificate     /etc/letsencrypt/live/mysuperapp.win/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mysuperapp.win/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location /api/ {
      proxy_pass http://backend:8080/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /_next/ {
      proxy_pass http://frontend:3000/_next/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location / {
      proxy_pass http://frontend:3000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
